name: Aggiorna premi Coin Master

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rewards:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cerca nuovi premi
        run: python scripts/update_rewards.py

      - name: Salva eventuali aggiornamenti
        run: |
          git config user.name "Ghost Master Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/rewards-data.js
          git diff --cached --quiet || git commit -m "Aggiorna premi giornalieri"
          git push
